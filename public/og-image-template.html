<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Image Template - Klaus Barkhausen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 60px 80px;
    }
    
    /* Animated gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
    }
    
    .orb-1 {
      width: 400px;
      height: 400px;
      background: #3b82f6;
      top: -100px;
      right: -100px;
    }
    
    .orb-2 {
      width: 300px;
      height: 300px;
      background: #06b6d4;
      bottom: -50px;
      left: -50px;
    }
    
    .orb-3 {
      width: 200px;
      height: 200px;
      background: #2563eb;
      top: 50%;
      left: 40%;
      opacity: 0.2;
    }
    
    /* Grid pattern overlay */
    .grid-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 60px;
      width: 100%;
    }
    
    .photo-container {
      flex-shrink: 0;
      position: relative;
    }
    
    .photo-glow {
      position: absolute;
      inset: -10px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4, #2563eb);
      border-radius: 50%;
      filter: blur(20px);
      opacity: 0.6;
    }
    
    .photo {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid transparent;
      background: linear-gradient(#0f172a, #0f172a) padding-box,
                  linear-gradient(135deg, #3b82f6, #06b6d4, #2563eb) border-box;
      position: relative;
      z-index: 1;
    }
    
    .text-content {
      flex: 1;
    }
    
    .name {
      font-size: 64px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 50%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      line-height: 1.1;
    }
    
    .title {
      font-size: 32px;
      font-weight: 600;
      color: #06b6d4;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .title-icon {
      width: 28px;
      height: 28px;
    }
    
    .tagline {
      font-size: 22px;
      color: #94a3b8;
      line-height: 1.5;
      max-width: 550px;
    }
    
    .tagline strong {
      color: #e2e8f0;
    }
    
    .stats {
      display: flex;
      gap: 40px;
      margin-top: 32px;
    }
    
    .stat {
      text-align: left;
    }
    
    .stat-number {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
    }
    
    .stat-label {
      font-size: 14px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .website {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 18px;
      color: #64748b;
      z-index: 10;
    }
    
    .website span {
      color: #06b6d4;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <!-- Background effects -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-pattern"></div>
    
    <!-- Content -->
    <div class="content">
      <div class="photo-container">
        <div class="photo-glow"></div>
        <!-- Replace with your actual photo path -->
        <img src="images/profile-photo.jpg" alt="Klaus Barkhausen" class="photo">
      </div>
      
      <div class="text-content">
        <h1 class="name">Klaus Barkhausen</h1>
        <div class="title">
          <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          AI Strategist & Solutions Architect
        </div>
        <p class="tagline">
          Transforming enterprise software with <strong>AI, cloud architecture</strong>, and scalable innovation.
        </p>
        <div class="stats">
          <div class="stat">
            <div class="stat-number">25+</div>
            <div class="stat-label">Years Experience</div>
          </div>
          <div class="stat">
            <div class="stat-number">100+</div>
            <div class="stat-label">Projects Delivered</div>
          </div>
          <div class="stat">
            <div class="stat-number">2</div>
            <div class="stat-label">Books Published</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="website">
      <span>klausbarkhausen.com</span>
    </div>
  </div>
</body>
</html>
